<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f3f4f6"/>
  <rect x="0" y="0" width="400" height="300" fill="url(#gradient)"/>
  
  <!-- Product icon -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="100" height="80" rx="8" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>
    <rect x="10" y="10" width="80" height="20" rx="4" fill="#9ca3af"/>
    <rect x="10" y="40" width="60" height="8" rx="4" fill="#9ca3af"/>
    <rect x="10" y="55" width="40" height="8" rx="4" fill="#9ca3af"/>
    <rect x="10" y="70" width="50" height="8" rx="4" fill="#9ca3af"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="250" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="14" font-weight="500">
    Product Image
  </text>
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fafb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3f4f6;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
