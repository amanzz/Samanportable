<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A3D2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5f3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <!-- Main Content Container -->
  <g transform="translate(80, 120)">
    <!-- Logo/Icon -->
    <rect x="0" y="0" width="80" height="80" rx="12" fill="white"/>
    <rect x="20" y="20" width="40" height="40" rx="6" fill="#0A3D2A"/>
    
    <!-- Company Name -->
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">
      SAMAN
    </text>
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#90EE90">
      PORTABLE
    </text>
    
    <!-- Main Heading -->
    <text x="0" y="150" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">
      Premium Portable Office Solutions
    </text>
    
    <!-- Subheading -->
    <text x="0" y="200" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)">
      Durable • Modular • Maintenance-Free
    </text>
    
    <!-- Features -->
    <g transform="translate(0, 250)">
      <circle cx="12" cy="12" r="6" fill="#90EE90"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="20" fill="white">
        Porta Cabins & Container Offices
      </text>
    </g>
    
    <g transform="translate(0, 290)">
      <circle cx="12" cy="12" r="6" fill="#90EE90"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="20" fill="white">
        Fast Installation & Delivery
      </text>
    </g>
    
    <g transform="translate(0, 330)">
      <circle cx="12" cy="12" r="6" fill="#90EE90"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="20" fill="white">
        Customizable & Weather Resistant
      </text>
    </g>
    
    <!-- Website URL -->
    <text x="0" y="410" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">
      www.samanportable.com
    </text>
  </g>
  
  <!-- Decorative Elements -->
  <g transform="translate(800, 100)">
    <!-- Abstract Building/Container Shape -->
    <rect x="0" y="50" width="280" height="180" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <rect x="20" y="70" width="80" height="60" rx="4" fill="rgba(255,255,255,0.15)"/>
    <rect x="120" y="70" width="80" height="60" rx="4" fill="rgba(255,255,255,0.15)"/>
    <rect x="220" y="70" width="40" height="60" rx="4" fill="rgba(255,255,255,0.15)"/>
    
    <rect x="20" y="150" width="80" height="60" rx="4" fill="rgba(255,255,255,0.15)"/>
    <rect x="120" y="150" width="80" height="60" rx="4" fill="rgba(255,255,255,0.15)"/>
    <rect x="220" y="150" width="40" height="60" rx="4" fill="rgba(255,255,255,0.15)"/>
    
    <!-- Door -->
    <rect x="240" y="180" width="20" height="40" rx="2" fill="rgba(255,255,255,0.3)"/>
    <circle cx="255" cy="195" r="2" fill="rgba(255,255,255,0.6)"/>
  </g>
</svg>
